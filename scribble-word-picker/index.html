<!DOCTYPE html>
<html>
<head>
  <title>Scribble Word Picker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-box">
    <h1>Scribble Word Picker</h1>
    <p>Select the correct word from the scribbled options.</p>

    <h2 id="question">Choose the correct word</h2>

    <div id="options"></div>

    <p id="message"></p>
    <p>Score: <span id="score">0</span></p>

    <button onclick="nextQuestion()">Next Word</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
