<!DOCTYPE html>
<html>
<head>
  <title>Quote Generator</title>
</head>
<body style="text-align:center; font-family:Arial; margin-top:50px;">

  <h2>Quote Generator</h2>

  <button onclick="generate()" style="padding:10px 20px;">New Quote</button>

  <p id="quote" style="font-size:20px; margin-top:20px;"></p>

  <script>
    let quotes = [
      "Believe in yourself",
      "Stay consistent",
      "Success is coming",
      "Keep going",
      "You are closer than you think"
    ];

    function generate() {
      let random = Math.floor(Math.random() * quotes.length);
      document.getElementById("quote").innerText = quotes[random];
    }
  </script>

</body>
</html>
