<!DOCTYPE html>
<html>
<head>
  <title>Mood Background Changer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h1>How are you feeling today?</h1>
    <p>Choose your mood and watch the background change!</p>

    <button onclick="changeMood('happy')">😊 Happy</button>
    <button onclick="changeMood('calm')">🌿 Calm</button>
    <button onclick="changeMood('tired')">😴 Tired</button>
    <button onclick="changeMood('motivated')">🚀 Motivated</button>

    <h2 id="message">Select a mood</h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
